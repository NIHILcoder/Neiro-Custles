appId: com.neiro.castles
productName: Neiro Castles
copyright: Copyright © 2026 Neiro

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.productivity

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

asar: true
